name: Deploy Firestore Rules

# ─────────────────────────────────────────────────────────────────────────────
# Automatically deploys Firestore security rules to the PRODUCTION project
# (refund-connect-1m30) whenever firestore.rules changes on the main branch.
#
# WHY THIS EXISTS
# ---------------
# Editing firestore.rules in the repo does NOTHING on its own — Firestore
# enforces the *deployed* ruleset, not the file on disk. If the deployed rules
# drift from the repo (e.g. they predate the `professionals/{uid}` create/update
# rule), tax-pro onboarding "Save Profile" fails with:
#     "Missing or insufficient permissions"
# This workflow guarantees the live rules always match main.
#
# REQUIRED REPO SECRET
# --------------------
#   FIREBASE_TOKEN  — generate locally with:  firebase login:ci
#                     then add it under: Settings → Secrets and variables →
#                     Actions → New repository secret.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/deploy-firestore-rules.yml'
  # Allow manual runs from the Actions tab as well.
  workflow_dispatch: {}

# Avoid overlapping deploys racing each other; cancel older in-flight runs.
concurrency:
  group: deploy-firestore-rules
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy & verify Firestore rules
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: refund-connect-1m30
      # firebase-tools 13.20.2 still supports legacy `--token` / FIREBASE_TOKEN auth.
      FIREBASE_TOOLS_VERSION: 13.20.2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}

      - name: Verify FIREBASE_TOKEN secret is configured
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN secret is not set. Generate one with 'firebase login:ci' and add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "FIREBASE_TOKEN secret detected."

      - name: Deploy Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "Deploying Firestore rules to project: $FIREBASE_PROJECT_ID"
          firebase deploy \
            --only firestore:rules \
            --project "$FIREBASE_PROJECT_ID" \
            --token "$FIREBASE_TOKEN" \
            --non-interactive \
            --force

      - name: Verify live rules match firestore.rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "Fetching live deployed ruleset for verification..."
          if firebase firestore:rules:get \
               --project "$FIREBASE_PROJECT_ID" \
               --token "$FIREBASE_TOKEN" > live-rules.txt 2>/dev/null; then
            if diff -q <(sed 's/[[:space:]]*$//' firestore.rules) \
                       <(sed 's/[[:space:]]*$//' live-rules.txt) >/dev/null 2>&1; then
              echo "SUCCESS: live deployed rules match firestore.rules."
            else
              echo "::warning::Live deployed rules differ from firestore.rules (CLI may normalize formatting). Diff below:"
              diff <(sed 's/[[:space:]]*$//' firestore.rules) \
                   <(sed 's/[[:space:]]*$//' live-rules.txt) || true
            fi
          else
            echo "::warning::Could not fetch live rules for an automatic diff (older CLI lacks 'firestore:rules:get'). Verify manually: https://console.firebase.google.com/project/$FIREBASE_PROJECT_ID/firestore/rules"
          fi

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Firestore Rules Deployment"
            echo ""
            echo "- **Project:** \`$FIREBASE_PROJECT_ID\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Status:** \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
